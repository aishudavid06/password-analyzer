<!DOCTYPE html>
<html>
<head>
    <title>Password Analyzer</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            background: #4facfe;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
        }

        .strength-bar {
            height: 10px;
            border-radius: 5px;
            margin-top: 10px;
            background: #ddd;
        }

        .bar {
            height: 100%;
            width: 0%;
            border-radius: 5px;
        }

        .weak { background: red; width: 30%; }
        .medium { background: orange; width: 60%; }
        .strong { background: green; width: 100%; }

        .rules {
            text-align: left;
            font-size: 14px;
            margin-top: 10px;
        }

        .valid { color: green; }
        .invalid { color: red; }

        .eye {
            cursor: pointer;
            margin-left: -30px;
        }

        .result {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Password Analyzer </h2>

    <form method="POST">
        <div style="position:relative;">
            <input type="password" id="password" name="password" placeholder="Enter password" required onkeyup="checkStrength()">
            <span class="eye" onclick="togglePassword()">👁</span>
        </div>

        <div class="strength-bar">
            <div id="bar" class="bar"></div>
        </div>

        <button type="submit">Check Strength</button>
    </form>

    <div class="rules">
        <p id="length" class="invalid">✔ At least 8 characters</p>
        <p id="upper" class="invalid">✔ Uppercase letter</p>
        <p id="lower" class="invalid">✔ Lowercase letter</p>
        <p id="number" class="invalid">✔ Number</p>
        <p id="special" class="invalid">✔ Special character</p>
    </div>

    <div class="result">
        {{ strength }}
    </div>

    {% if suggestion %}
    <div style="color:green;">
        Suggested: {{ suggestion }}
    </div>
    {% endif %}
</div>

<script>
function togglePassword() {
    var x = document.getElementById("password");
    x.type = (x.type === "password") ? "text" : "password";
}

function checkStrength() {
    let pwd = document.getElementById("password").value;

    let bar = document.getElementById("bar");

    let strength = 0;

    // Rules
    if (pwd.length >= 8) {
        document.getElementById("length").className = "valid";
        strength++;
    } else {
        document.getElementById("length").className = "invalid";
    }

    if (/[A-Z]/.test(pwd)) {
        document.getElementById("upper").className = "valid";
        strength++;
    } else {
        document.getElementById("upper").className = "invalid";
    }

    if (/[a-z]/.test(pwd)) {
        document.getElementById("lower").className = "valid";
        strength++;
    } else {
        document.getElementById("lower").className = "invalid";
    }

    if (/[0-9]/.test(pwd)) {
        document.getElementById("number").className = "valid";
        strength++;
    } else {
        document.getElementById("number").className = "invalid";
    }

    if (/[!@#$%^&*]/.test(pwd)) {
        document.getElementById("special").className = "valid";
        strength++;
    } else {
        document.getElementById("special").className = "invalid";
    }

    // Strength bar
    bar.className = "bar";
    if (strength <= 2) {
        bar.classList.add("weak");
    } else if (strength <= 4) {
        bar.classList.add("medium");
    } else {
        bar.classList.add("strong");
    }
}
</script>

</body>
</html>
